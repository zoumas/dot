# See https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
# Colors: Catppuccin Mocha (https://catppuccin.com/palette)

$font = Monospace

# Catppuccin Mocha palette (alpha baked in, hyprlang variables are plain text substitution)
$base = 1e1e2e66
$text = cdd6f4ff
$green = a6e3a1ee
$teal = 94e2d5ee
$red = f38ba8ee
$maroon = eba0acee
$mauve = cba6f7ee
$blue = 89b4faee
$yellow = f9e2afff

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba($base)

    outer_color = rgba($mauve) rgba($blue) 45deg
    check_color = rgba($green) rgba($teal) 120deg
    fail_color = rgba($red) rgba($maroon) 40deg

    font_color = rgba($text)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgba($text)

    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 25
    font_family = $font
    color = rgba($text)

    position = -30, -150
    halign = right
    valign = top
}

# Current keyboard layout, so you can tell if you're typing in the wrong one
label {
    monitor =
    text = $LAYOUT[us,gr]
    font_size = 18
    font_family = $font
    color = rgba($yellow)
    onclick = hyprctl switchxkblayout all next

    position = 0, -80
    halign = center
    valign = center
}
